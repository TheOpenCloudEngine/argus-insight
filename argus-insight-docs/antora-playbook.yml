# Argus Insight Documentation - Antora Playbook
# Generates HTML site from AsciiDoc sources

site:
  title: Argus Insight Documentation
  url: https://docs.argus-insight.io
  start_page: argus-insight::index.adoc

content:
  sources:
    - url: .
      branches: HEAD
      start_path: docs

asciidoc:
  attributes:
    allow-uri-read: ''
    source-highlighter: highlight.js
    icons: font
    hide-uri-scheme: ''

ui:
  bundle:
    url: https://gitlab.com/antora/antora-ui-default/-/jobs/artifacts/HEAD/raw/build/ui-bundle.zip?job=bundle-stable
    snapshot: true
  supplemental_files: ./ui-supplemental

output:
  dir: ./build/site
