# Argus Insight Agent - Variable Definitions
# This file defines variables that can be referenced in config.yml as ${variable_name}.
# Format: key=value (Java properties style)

# Server
server.host=0.0.0.0
server.port=8600

# Logging
log.level=INFO
log.dir=/var/log/argus-insight-agent
log.filename=agent.log
log.rolling.type=daily
log.rolling.backup_count=30

# Backup
backup.dir=/opt/argus-insight/agent/backups

# Data
data.dir=/var/lib/argus-insight-agent

# Command execution
command.timeout=300
command.max_output=1048576

# Monitor
monitor.interval=5

# Terminal
terminal.shell=/bin/bash
terminal.max_sessions=10
