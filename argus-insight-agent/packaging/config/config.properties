# Argus Insight Agent - Variable Definitions
# This file defines variables that can be referenced in config.yml as ${variable_name}.
# Format: key=value (Java properties style)

# Server
server.host=0.0.0.0
server.port=4501

# Logging
log.level=INFO
# log.dir=/var/log/argus-insight-agent
log.dir=logs
log.filename=agent.log
log.rolling.type=daily
log.rolling.backup_count=30

# Backup
# backup.dir=/opt/argus-insight/agent/backups
backup.dir=backups

# Data
# data.dir=/var/lib/argus-insight-agent
data.dir=data

# Command execution
command.timeout=300
command.max_output=1048576

# Monitor
monitor.interval=5

# Terminal
terminal.shell=/bin/bash
terminal.max_sessions=10

# Certificate
cert.dir=/opt/argus-insight-agent/certificates
cert.days=825
cert.key_bits=2048

# Heartbeat
heartbeat.interval=60

# File manager
filemgr.exec_timeout=60

# Prometheus Push Gateway
prometheus.enable-push=true
prometheus.push-cron=* * * * *
prometheus.pushgateway.host=localhost
prometheus.pushgateway.port=9091
