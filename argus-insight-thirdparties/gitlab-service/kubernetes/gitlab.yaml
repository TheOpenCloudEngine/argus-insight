apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitlab
  namespace: argus-insight
  labels:
    app.kubernetes.io/name: gitlab
    app.kubernetes.io/part-of: argus-insight
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: gitlab
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitlab
        app.kubernetes.io/part-of: argus-insight
    spec:
      containers:
        - name: gitlab
          image: gitlab/gitlab-ce:17.9.1-ce.0
          env:
            - name: GITLAB_OMNIBUS_CONFIG
              value: "from_file('/etc/gitlab/gitlab.rb')"
            - name: GITLAB_INITIAL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gitlab-secrets
                  key: initial_root_password
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: https
              containerPort: 443
              protocol: TCP
            - name: ssh
              containerPort: 22
              protocol: TCP
          resources:
            requests:
              cpu: "1"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          livenessProbe:
            httpGet:
              path: /-/liveness
              port: http
            initialDelaySeconds: 300
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /-/readiness
              port: http
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /-/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 30
          volumeMounts:
            - name: config-volume
              mountPath: /etc/gitlab/gitlab.rb
              subPath: gitlab.rb
            - name: gitlab-config
              mountPath: /etc/gitlab
            - name: gitlab-logs
              mountPath: /var/log/gitlab
            - name: gitlab-data
              mountPath: /var/opt/gitlab
      volumes:
        - name: config-volume
          configMap:
            name: gitlab-config
            items:
              - key: gitlab.rb
                path: gitlab.rb
        - name: gitlab-config
          persistentVolumeClaim:
            claimName: gitlab-config
        - name: gitlab-logs
          persistentVolumeClaim:
            claimName: gitlab-logs
        - name: gitlab-data
          persistentVolumeClaim:
            claimName: gitlab-data
---
apiVersion: v1
kind: Service
metadata:
  name: gitlab
  namespace: argus-insight
  labels:
    app.kubernetes.io/name: gitlab
    app.kubernetes.io/part-of: argus-insight
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: https
      port: 443
      targetPort: https
      protocol: TCP
    - name: ssh
      port: 22
      targetPort: ssh
      protocol: TCP
  selector:
    app.kubernetes.io/name: gitlab
