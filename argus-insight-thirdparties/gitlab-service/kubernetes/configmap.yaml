apiVersion: v1
kind: ConfigMap
metadata:
  name: gitlab-config
  namespace: argus-insight
  labels:
    app.kubernetes.io/name: gitlab
    app.kubernetes.io/part-of: argus-insight
data:
  gitlab.rb: |
    # GitLab Omnibus Configuration for Kubernetes
    external_url 'http://gitlab.argus.local'

    # Rails
    gitlab_rails['time_zone'] = 'Asia/Seoul'
    gitlab_rails['gitlab_shell_ssh_port'] = 22
    gitlab_rails['initial_root_password'] = ENV['GITLAB_INITIAL_ROOT_PASSWORD']

    # OmniAuth / SSO
    gitlab_rails['omniauth_enabled'] = true
    gitlab_rails['omniauth_allow_single_sign_on'] = ['openid_connect']
    gitlab_rails['omniauth_block_auto_created_users'] = false
    gitlab_rails['omniauth_auto_link_user'] = ['openid_connect']

    # Nginx
    nginx['listen_port'] = 80
    nginx['listen_https'] = false

    # PostgreSQL
    postgresql['shared_buffers'] = "256MB"
    postgresql['max_worker_processes'] = 4

    # Puma
    puma['worker_processes'] = 2
    puma['min_threads'] = 1
    puma['max_threads'] = 4

    # Sidekiq
    sidekiq['max_concurrency'] = 10

    # Disable bundled monitoring (use Argus Prometheus)
    prometheus['enable'] = false
    grafana['enable'] = false
    gitlab_rails['monitoring_whitelist'] = ['0.0.0.0/0']

    # Disable unused services
    registry['enable'] = false
    gitlab_pages['enable'] = false

    # Backup
    gitlab_rails['backup_keep_time'] = 604800
