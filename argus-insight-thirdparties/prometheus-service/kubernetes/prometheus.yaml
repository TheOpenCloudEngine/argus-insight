apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: argus-insight
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: argus-insight
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/part-of: argus-insight
    spec:
      securityContext:
        fsGroup: 65534
        runAsUser: 65534
        runAsNonRoot: true
      containers:
        - name: prometheus
          image: argus-insight/prometheus:2.53.4
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/var/lib/prometheus"
            - "--storage.tsdb.retention.time=90d"
            - "--storage.tsdb.retention.size=45GB"
            - "--web.listen-address=0.0.0.0:9090"
            - "--web.external-url=http://localhost/prometheus"
            - "--web.enable-lifecycle"
          ports:
            - name: http
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /prometheus/-/healthy
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /prometheus/-/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: rules
              mountPath: /etc/prometheus/rules
            - name: data
              mountPath: /var/lib/prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
            items:
              - key: prometheus.yml
                path: prometheus.yml
        - name: rules
          configMap:
            name: prometheus-config
            items:
              - key: node_alerts.yml
                path: node_alerts.yml
              - key: prometheus_alerts.yml
                path: prometheus_alerts.yml
        - name: data
          persistentVolumeClaim:
            claimName: argus-prometheus
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: argus-insight
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: argus-insight
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 9090
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: prometheus
