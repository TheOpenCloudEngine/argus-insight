apiVersion: apps/v1
kind: Deployment
metadata:
  name: powerdns-admin
  namespace: argus-insight
  labels:
    app.kubernetes.io/name: powerdns-admin
    app.kubernetes.io/part-of: argus-insight
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: powerdns-admin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: powerdns-admin
        app.kubernetes.io/part-of: argus-insight
    spec:
      containers:
        - name: powerdns-admin
          image: argus-insight/powerdns-admin:v0.4.2
          env:
            - name: SQLALCHEMY_DATABASE_URI
              value: "mysql://pdns:pdns@powerdns-db:3306/pdns"
            - name: GUNICORN_TIMEOUT
              value: "60"
            - name: PDNS_API_URL
              value: "http://powerdns-server:8083/"
            - name: PDNS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: powerdns-secrets
                  key: pdns_api_key
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: powerdns-admin
  namespace: argus-insight
  labels:
    app.kubernetes.io/name: powerdns-admin
    app.kubernetes.io/part-of: argus-insight
spec:
  type: NodePort
  ports:
    - name: http
      port: 8082
      targetPort: http
      nodePort: 8082
      protocol: TCP
  selector:
    app.kubernetes.io/name: powerdns-admin
