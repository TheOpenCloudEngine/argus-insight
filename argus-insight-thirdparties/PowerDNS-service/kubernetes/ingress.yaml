apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: powerdns
  namespace: argus-insight
  labels:
    app.kubernetes.io/part-of: argus-insight
spec:
  ingressClassName: traefik
  rules:
    - host: powerdns-admin.argus-insight.dev.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: powerdns-admin
                port:
                  number: 80
    - host: ns.argus-insight.dev.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: powerdns-server
                port:
                  number: 8081
