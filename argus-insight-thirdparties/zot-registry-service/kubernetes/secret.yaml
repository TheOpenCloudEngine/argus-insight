apiVersion: v1
kind: Secret
metadata:
  name: zot-registry-secrets
  namespace: argus-insight
  labels:
    app.kubernetes.io/name: zot-registry
    app.kubernetes.io/part-of: argus-insight
type: Opaque
stringData:
  # htpasswd 파일 내용 (bcrypt 해시)
  # htpasswd -bB htpasswd <username> <password> 로 생성
  htpasswd: |
    admin:$2y$05$zOX0mfNzHtU6ADSrerhh.O/F41swyZQ6BdQ4.LaOV6IMhI2ybRJb.
  # 업스트림 레지스트리 인증 정보
  credentials.json: |
    {
      "registry-1.docker.io": {
        "username": "USERNAME",
        "password": "ACCESS_TOKEN"
      }
    }
