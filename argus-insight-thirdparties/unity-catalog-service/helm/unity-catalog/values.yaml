replicaCount: 1

image:
  repository: argus-insight/unity-catalog
  tag: "0.4.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi

config:
  serverProperties: |
    server.port=8080

livenessProbe:
  httpGet:
    path: /api/2.1/unity-catalog/catalogs
    port: http
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /api/2.1/unity-catalog/catalogs
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3

nodeSelector: {}
tolerations: []
affinity: {}

securityContext:
  fsGroup: 65534
  runAsUser: 65534
  runAsNonRoot: true
