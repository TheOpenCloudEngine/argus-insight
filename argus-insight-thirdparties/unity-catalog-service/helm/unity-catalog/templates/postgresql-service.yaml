{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "unity-catalog.fullname" . }}-db
  labels:
    {{- include "unity-catalog.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  ports:
    - name: postgresql
      port: 5432
      targetPort: postgresql
      protocol: TCP
  selector:
    app.kubernetes.io/name: {{ include "unity-catalog.fullname" . }}-db
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
