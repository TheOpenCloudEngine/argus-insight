apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "unity-catalog.fullname" . }}
  labels:
    {{- include "unity-catalog.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "unity-catalog.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "unity-catalog.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/part-of: argus-insight
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      initContainers:
        - name: init-data-dir
          image: alpine:3.21
          command:
            - sh
            - -c
            - |
              mkdir -p /home/unitycatalog/etc/data /home/unitycatalog/etc/db
              chown -R 65534:65534 /home/unitycatalog/etc/data /home/unitycatalog/etc/db
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: data
              mountPath: /home/unitycatalog/etc/data
            - name: db
              mountPath: /home/unitycatalog/etc/db
        {{- if .Values.postgresql.enabled }}
        - name: wait-for-db
          image: alpine:3.21
          command:
            - sh
            - -c
            - |
              apk add --no-cache postgresql-client > /dev/null 2>&1
              until pg_isready -h {{ include "unity-catalog.fullname" . }}-db -p 5432 -U {{ .Values.postgresql.auth.username }}; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
          securityContext:
            runAsUser: 0
        {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /home/unitycatalog/etc/data
            - name: db
              mountPath: /home/unitycatalog/etc/db
            - name: config
              mountPath: /home/unitycatalog/etc/conf/hibernate.properties
              subPath: hibernate.properties
            - name: config
              mountPath: /home/unitycatalog/etc/conf/server.properties
              subPath: server.properties
      volumes:
        - name: config
          configMap:
            name: {{ include "unity-catalog.fullname" . }}
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "unity-catalog.fullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: db
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
