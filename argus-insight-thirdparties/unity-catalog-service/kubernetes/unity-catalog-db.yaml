apiVersion: apps/v1
kind: Deployment
metadata:
  name: unity-catalog-db
  namespace: argus-insight
  labels:
    app.kubernetes.io/name: unity-catalog-db
    app.kubernetes.io/part-of: argus-insight
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: unity-catalog-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: unity-catalog-db
        app.kubernetes.io/part-of: argus-insight
    spec:
      containers:
        - name: postgresql
          image: argus-insight/unity-catalog-postgresql:17
          imagePullPolicy: Never
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: unity-catalog-secrets
                  key: postgresql_database
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: unity-catalog-secrets
                  key: postgresql_user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: unity-catalog-secrets
                  key: postgresql_password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgresql
              containerPort: 5432
              protocol: TCP
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - unity_catalog
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - unity_catalog
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
            - name: init-schema
              mountPath: /docker-entrypoint-initdb.d/01-schema.sql
              subPath: 01-schema.sql
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: argus-unity-catalog-pgdata
        - name: init-schema
          configMap:
            name: unity-catalog-config
            items:
              - key: 01-schema.sql
                path: 01-schema.sql
---
apiVersion: v1
kind: Service
metadata:
  name: unity-catalog-db
  namespace: argus-insight
  labels:
    app.kubernetes.io/name: unity-catalog-db
    app.kubernetes.io/part-of: argus-insight
spec:
  type: ClusterIP
  ports:
    - name: postgresql
      port: 5432
      targetPort: postgresql
      protocol: TCP
  selector:
    app.kubernetes.io/name: unity-catalog-db
