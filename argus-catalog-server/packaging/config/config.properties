# Catalog Server configuration
server.host=0.0.0.0
server.port=4600

# Logging
log.level=INFO
log.dir=/var/log/argus-catalog-server
log.filename=argus-catalog-server.log

# CORS
cors.origins=*

# Database
db.type=postgresql
db.host=localhost
db.port=5432
db.name=argus_catalog
db.username=argus
db.password=argus

# Object Storage (MinIO)
os.endpoint=http://localhost:9000
os.access_key=minioadmin
os.secret_key=minioadmin
os.region=us-east-1
os.use_ssl=false
os.bucket=model-artifacts
os.presigned_url_expiry=3600
