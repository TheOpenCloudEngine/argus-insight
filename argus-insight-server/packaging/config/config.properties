# Argus Insight Server - Variable Definitions
# This file defines variables that can be referenced in config.yml as ${variable_name}.
# Format: key=value (Java properties style)

# Server
server.host=0.0.0.0
server.port=8080

# Logging
log.level=INFO
# log.dir=/var/log/argus-insight-server
log.dir=logs
log.filename=server.log
log.rolling.type=daily
log.rolling.backup_count=30

# Data
# data.dir=/var/lib/argus-insight-server
data.dir=data

# CORS
cors.origins=*

# Agent communication
agent.timeout=30
agent.health_interval=60
agent.heartbeat_check_interval=60
agent.heartbeat_disconnect_timeout=180

# Database - PostgreSQL (default)
db.type=postgresql
db.host=localhost
db.port=5432
db.name=argus
db.username=argus
db.password=argus
db.pool.size=5
db.pool.max_overflow=10
db.pool.recycle=3600

# Database - MariaDB (uncomment below and comment out PostgreSQL above)
