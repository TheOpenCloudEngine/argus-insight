# Argus Insight Server - Variable Definitions
# This file defines variables that can be referenced in config.yml as ${variable_name}.
# Format: key=value (Java properties style)

# Server
server.host=0.0.0.0
server.port=8080

# Logging
log.level=INFO
log.dir=/var/log/argus-insight-server
log.filename=server.log
log.rolling.type=daily
log.rolling.backup_count=30

# Data
data.dir=/var/lib/argus-insight-server

# CORS
cors.origins=*

# Agent communication
agent.timeout=30
agent.health_interval=60
