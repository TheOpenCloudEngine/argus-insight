# Argus Insight Server - Variable Definitions
# This file defines variables that can be referenced in config.yml as ${variable_name}.
# Format: key=value (Java properties style)

# Server
server.host=0.0.0.0
server.port=4500

# Logging
log.level=DEBUG
# log.dir=/var/log/argus-insight-server
log.dir=logs
log.filename=server.log
log.rolling.type=daily
log.rolling.backup_count=30

# Data
# data.dir=/var/lib/argus-insight-server
data.dir=data

# CORS
cors.origins=*

# Agent communication
agent.timeout=30
agent.health_interval=60
agent.heartbeat_check_interval=60
agent.heartbeat_disconnect_timeout=180

# Object Storage (S3/MinIO)
s3.endpoint_url=http://10.0.1.50:51000
s3.access_key=minioadmin
s3.secret_key=minioadmin
s3.region=us-east-1
s3.default_bucket=test
s3.use_ssl=false
s3.multipart_threshold=8388608
s3.multipart_chunksize=8388608
s3.presigned_url_expiry=3600

# GitLab (for Workspace Provisioner)
gitlab.url=https://gitlab-global.argus-insight.dev.net
gitlab.token=

# Database - PostgreSQL (default)
db.type=postgresql
db.host=localhost
db.port=5432
db.name=argus
db.username=argus
db.password=argus
db.pool.size=5
db.pool.max_overflow=10
db.pool.recycle=3600

# Database - MariaDB (uncomment below and comment out PostgreSQL above)
