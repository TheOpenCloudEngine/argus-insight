# Argus Insight Server Configuration
# Variables use Spring Boot style: ${variable:default_value}
# Values are resolved from config.properties. If not found, the default value is used.

app:
  name: argus-insight-server
  version: 0.1.0
  debug: false

server:
  host: ${server.host:0.0.0.0}
  port: ${server.port:4500}

logging:
  level: ${log.level:INFO}
  dir: ${log.dir:/var/log/argus-insight-server}
  filename: ${log.filename:server.log}
  rolling:
    type: ${log.rolling.type:daily}
    backup_count: ${log.rolling.backup_count:30}

data:
  dir: ${data.dir:/var/lib/argus-insight-server}

cors:
  origins: ${cors.origins:*}

agent:
  timeout: ${agent.timeout:30}
  health_interval: ${agent.health_interval:60}
  heartbeat_check_interval: ${agent.heartbeat_check_interval:60}
  heartbeat_disconnect_timeout: ${agent.heartbeat_disconnect_timeout:180}

# Database
# Supported types: postgresql, mariadb
database:
  type: ${db.type:postgresql}
  host: ${db.host:localhost}
  port: ${db.port:5432}
  name: ${db.name:argus}
  username: ${db.username:argus}
  password: ${db.password:argus}
  echo: false
  pool:
    size: ${db.pool.size:5}
    max_overflow: ${db.pool.max_overflow:10}
    recycle: ${db.pool.recycle:3600}

# GitLab (for Workspace Provisioner)
gitlab:
  url: ${gitlab.url:}
  token: ${gitlab.token:}

