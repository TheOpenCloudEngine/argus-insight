apiVersion: v1
kind: Service
metadata:
  name: argus-vscode-${USERNAME}
  namespace: ${K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: code-server
    app.kubernetes.io/instance: ${USERNAME}
    app.kubernetes.io/part-of: argus-insight
    argus-insight/component: vscode
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: code-server
    app.kubernetes.io/instance: ${USERNAME}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argus-vscode-${USERNAME}
  namespace: ${K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: code-server
    app.kubernetes.io/instance: ${USERNAME}
    app.kubernetes.io/part-of: argus-insight
    argus-insight/component: vscode
  annotations:
    nginx.ingress.kubernetes.io/auth-url: "http://${ARGUS_SERVER_HOST}:4500/api/v1/apps/vscode/auth-verify"
    nginx.ingress.kubernetes.io/auth-snippet: |
      proxy_set_header X-Original-Host $host;
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  ingressClassName: nginx
  rules:
    - host: ${HOSTNAME}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argus-vscode-${USERNAME}
                port:
                  name: http
