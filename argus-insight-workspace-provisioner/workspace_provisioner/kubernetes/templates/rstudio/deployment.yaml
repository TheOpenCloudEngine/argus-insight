apiVersion: apps/v1
kind: Deployment
metadata:
  name: argus-rstudio-${INSTANCE_ID}
  namespace: ${K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: rstudio
    app.kubernetes.io/instance: "${INSTANCE_ID}"
    app.kubernetes.io/part-of: argus-insight
    argus-insight/workspace: ${WORKSPACE_NAME}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rstudio
      app.kubernetes.io/instance: "${INSTANCE_ID}"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rstudio
        app.kubernetes.io/instance: "${INSTANCE_ID}"
        app.kubernetes.io/part-of: argus-insight
        argus-insight/workspace: ${WORKSPACE_NAME}
    spec:
      containers:
        - name: rstudio
          image: ${RSTUDIO_IMAGE}
          env:
            - name: DISABLE_AUTH
              value: "true"
            - name: ROOT
              value: "true"
          ports:
            - name: http
              containerPort: 8787
              protocol: TCP
          resources:
            requests:
              cpu: "${RSTUDIO_CPU_REQUEST}"
              memory: "${RSTUDIO_MEMORY_REQUEST}"
            limits:
              cpu: "${RSTUDIO_CPU_LIMIT}"
              memory: "${RSTUDIO_MEMORY_LIMIT}"
          volumeMounts:
            - name: workspace-vol
              mountPath: /workspace
              mountPropagation: HostToContainer
            - name: data-vol
              mountPath: /data
              mountPropagation: HostToContainer
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
        # Sidecar 1: Mount workspace bucket to /workspace (shared team storage)
        - name: s3fs-workspace
          image: ${S3FS_IMAGE}
          securityContext:
            privileged: true
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: argus-rstudio-${INSTANCE_ID}
                  key: aws-access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: argus-rstudio-${INSTANCE_ID}
                  key: aws-secret-key
            - name: S3_BUCKET
              value: "${WORKSPACE_BUCKET}"
            - name: S3_ENDPOINT
              value: "${S3_ENDPOINT}"
            - name: S3_USE_SSL
              value: "${S3_USE_SSL}"
          command:
            - /bin/sh
            - -c
            - |
              echo "$${AWS_ACCESS_KEY_ID}:$${AWS_SECRET_ACCESS_KEY}" > /etc/passwd-s3fs
              chmod 600 /etc/passwd-s3fs
              SSL_OPT=""
              if [ "$${S3_USE_SSL}" = "false" ]; then
                SSL_OPT="-o no_check_certificate -o use_path_request_style"
              else
                SSL_OPT="-o use_path_request_style"
              fi
              exec s3fs "$${S3_BUCKET}" /workspace \
                -o passwd_file=/etc/passwd-s3fs \
                -o url="$${S3_ENDPOINT}" \
                -o allow_other \
                -o uid=1000 -o gid=1000 \
                $${SSL_OPT} \
                -f
          volumeMounts:
            - name: workspace-vol
              mountPath: /workspace
              mountPropagation: Bidirectional
        # Sidecar 2: Mount user bucket to /data (per-user working directory)
        - name: s3fs-data
          image: ${S3FS_IMAGE}
          securityContext:
            privileged: true
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: argus-rstudio-${INSTANCE_ID}
                  key: aws-access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: argus-rstudio-${INSTANCE_ID}
                  key: aws-secret-key
            - name: S3_BUCKET
              value: "${USER_BUCKET}"
            - name: S3_ENDPOINT
              value: "${S3_ENDPOINT}"
            - name: S3_USE_SSL
              value: "${S3_USE_SSL}"
          command:
            - /bin/sh
            - -c
            - |
              echo "$${AWS_ACCESS_KEY_ID}:$${AWS_SECRET_ACCESS_KEY}" > /etc/passwd-s3fs
              chmod 600 /etc/passwd-s3fs
              SSL_OPT=""
              if [ "$${S3_USE_SSL}" = "false" ]; then
                SSL_OPT="-o no_check_certificate -o use_path_request_style"
              else
                SSL_OPT="-o use_path_request_style"
              fi
              exec s3fs "$${S3_BUCKET}" /data \
                -o passwd_file=/etc/passwd-s3fs \
                -o url="$${S3_ENDPOINT}" \
                -o allow_other \
                -o uid=1000 -o gid=1000 \
                $${SSL_OPT} \
                -f
          volumeMounts:
            - name: data-vol
              mountPath: /data
              mountPropagation: Bidirectional
      volumes:
        - name: workspace-vol
          emptyDir: {}
        - name: data-vol
          emptyDir: {}
