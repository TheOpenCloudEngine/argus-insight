apiVersion: v1
kind: Service
metadata:
  name: argus-rstudio-${INSTANCE_ID}
  namespace: ${K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: rstudio
    app.kubernetes.io/instance: "${INSTANCE_ID}"
    app.kubernetes.io/part-of: argus-insight
    argus-insight/workspace: ${WORKSPACE_NAME}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8787
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: rstudio
    app.kubernetes.io/instance: "${INSTANCE_ID}"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argus-rstudio-${INSTANCE_ID}
  namespace: ${K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: rstudio
    app.kubernetes.io/instance: "${INSTANCE_ID}"
    app.kubernetes.io/part-of: argus-insight
    argus-insight/workspace: ${WORKSPACE_NAME}
  annotations:
    nginx.ingress.kubernetes.io/auth-url: "http://${ARGUS_SERVER_HOST}:4500/api/v1/workspace/workspaces/auth-verify?service_id=${INSTANCE_ID}"
    nginx.ingress.kubernetes.io/proxy-body-size: "256m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr"
spec:
  ingressClassName: nginx
  rules:
    - host: ${HOSTNAME}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argus-rstudio-${INSTANCE_ID}
                port:
                  name: http
