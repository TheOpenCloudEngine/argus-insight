apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: argus-neo4j-${WORKSPACE_NAME}
  namespace: ${K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: neo4j
    app.kubernetes.io/instance: ${WORKSPACE_NAME}
    app.kubernetes.io/part-of: argus-insight
    argus-insight/workspace: ${WORKSPACE_NAME}
spec:
  serviceName: argus-neo4j-${WORKSPACE_NAME}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: neo4j
      app.kubernetes.io/instance: ${WORKSPACE_NAME}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: neo4j
        app.kubernetes.io/instance: ${WORKSPACE_NAME}
        app.kubernetes.io/part-of: argus-insight
        argus-insight/workspace: ${WORKSPACE_NAME}
    spec:
      containers:
        - name: neo4j
          image: ${NEO4J_IMAGE}
          env:
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef:
                  name: argus-neo4j-${WORKSPACE_NAME}
                  key: NEO4J_AUTH
            - name: NEO4J_PLUGINS
              value: '["apoc"]'
            - name: NEO4J_server_default__listen__address
              value: "0.0.0.0"
            - name: NEO4J_server_bolt_advertised__address
              value: "${BOLT_HOSTNAME}:443"
          ports:
            - name: http
              containerPort: 7474
              protocol: TCP
            - name: bolt
              containerPort: 7687
              protocol: TCP
          resources:
            requests:
              cpu: "${NEO4J_CPU_REQUEST}"
              memory: "${NEO4J_MEMORY_REQUEST}"
            limits:
              cpu: "${NEO4J_CPU_LIMIT}"
              memory: "${NEO4J_MEMORY_LIMIT}"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: argus-neo4j-${WORKSPACE_NAME}-data
