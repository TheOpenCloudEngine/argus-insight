apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-${WORKSPACE_NAME}-config
  namespace: ${K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: airflow
    app.kubernetes.io/instance: ${WORKSPACE_NAME}
    app.kubernetes.io/part-of: argus-insight
    argus-insight/workspace: ${WORKSPACE_NAME}
data:
  airflow.cfg: |
    [core]
    dags_folder = /opt/airflow/dags
    executor = LocalExecutor
    load_examples = False
    default_timezone = UTC

    [database]
    sql_alchemy_conn = postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD}@airflow-${WORKSPACE_NAME}-db:5432/airflow

    [webserver]
    base_url = https://airflow-${WORKSPACE_NAME}.argus-insight.${DOMAIN}
    web_server_port = 8080
    rbac = True
    expose_config = False

    [scheduler]
    dag_dir_list_interval = 30
    min_file_process_interval = 30

    [logging]
    base_log_folder = /opt/airflow/logs
    remote_logging = False

  git-sync.sh: |
    #!/bin/bash
    set -e
    REPO_URL="${GITLAB_REPO_URL}"
    BRANCH="main"
    SYNC_DIR="/opt/airflow/dags"
    while true; do
      if [ -d "$SYNC_DIR/.git" ]; then
        cd "$SYNC_DIR" && git fetch origin "$BRANCH" && git reset --hard "origin/$BRANCH"
      else
        git clone --branch "$BRANCH" --single-branch "$REPO_URL" "$SYNC_DIR"
      fi
      sleep 60
    done
