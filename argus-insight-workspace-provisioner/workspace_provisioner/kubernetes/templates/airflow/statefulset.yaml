apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: argus-airflow-${WORKSPACE_NAME}
  namespace: ${K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: airflow
    app.kubernetes.io/instance: ${WORKSPACE_NAME}
    app.kubernetes.io/part-of: argus-insight
    argus-insight/workspace: ${WORKSPACE_NAME}
spec:
  serviceName: argus-airflow-${WORKSPACE_NAME}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: airflow
      app.kubernetes.io/instance: ${WORKSPACE_NAME}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: airflow
        app.kubernetes.io/instance: ${WORKSPACE_NAME}
        app.kubernetes.io/part-of: argus-insight
        argus-insight/workspace: ${WORKSPACE_NAME}
    spec:
      initContainers:
        - name: db-init
          image: ${AIRFLOW_IMAGE}
          command: ["airflow", "db", "migrate"]
          envFrom:
            - configMapRef:
                name: argus-airflow-${WORKSPACE_NAME}-env
                optional: true
          env:
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              value: "postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD}@argus-airflow-${WORKSPACE_NAME}-db:5432/airflow"
            - name: AIRFLOW__CORE__FERNET_KEY
              valueFrom:
                secretKeyRef:
                  name: argus-airflow-${WORKSPACE_NAME}
                  key: fernet-key
          volumeMounts:
            - name: config
              mountPath: /opt/airflow/airflow.cfg
              subPath: airflow.cfg
        - name: create-admin
          image: ${AIRFLOW_IMAGE}
          command:
            - bash
            - -c
            - |
              airflow users list | grep -q admin || \
              airflow users create \
                --username admin \
                --firstname Admin \
                --lastname User \
                --role Admin \
                --email admin@argus-insight.local \
                --password "$ADMIN_PASSWORD"
          env:
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              value: "postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD}@argus-airflow-${WORKSPACE_NAME}-db:5432/airflow"
            - name: AIRFLOW__CORE__FERNET_KEY
              valueFrom:
                secretKeyRef:
                  name: argus-airflow-${WORKSPACE_NAME}
                  key: fernet-key
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: argus-airflow-${WORKSPACE_NAME}
                  key: admin-password
          volumeMounts:
            - name: config
              mountPath: /opt/airflow/airflow.cfg
              subPath: airflow.cfg
      containers:
        - name: webserver
          image: ${AIRFLOW_IMAGE}
          command: ["airflow", "webserver"]
          env:
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              value: "postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD}@argus-airflow-${WORKSPACE_NAME}-db:5432/airflow"
            - name: AIRFLOW__CORE__FERNET_KEY
              valueFrom:
                secretKeyRef:
                  name: argus-airflow-${WORKSPACE_NAME}
                  key: fernet-key
            - name: AIRFLOW__WEBSERVER__SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: argus-airflow-${WORKSPACE_NAME}
                  key: webserver-secret-key
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: "${AIRFLOW_WEBSERVER_CPU_REQUEST}"
              memory: "${AIRFLOW_WEBSERVER_MEMORY_REQUEST}"
            limits:
              cpu: "${AIRFLOW_WEBSERVER_CPU_LIMIT}"
              memory: "${AIRFLOW_WEBSERVER_MEMORY_LIMIT}"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /opt/airflow/airflow.cfg
              subPath: airflow.cfg
            - name: dags
              mountPath: /opt/airflow/dags
            - name: logs
              mountPath: /opt/airflow/logs
        - name: scheduler
          image: ${AIRFLOW_IMAGE}
          command: ["airflow", "scheduler"]
          env:
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              value: "postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD}@argus-airflow-${WORKSPACE_NAME}-db:5432/airflow"
            - name: AIRFLOW__CORE__FERNET_KEY
              valueFrom:
                secretKeyRef:
                  name: argus-airflow-${WORKSPACE_NAME}
                  key: fernet-key
          resources:
            requests:
              cpu: "${AIRFLOW_SCHEDULER_CPU_REQUEST}"
              memory: "${AIRFLOW_SCHEDULER_MEMORY_REQUEST}"
            limits:
              cpu: "${AIRFLOW_SCHEDULER_CPU_LIMIT}"
              memory: "${AIRFLOW_SCHEDULER_MEMORY_LIMIT}"
          volumeMounts:
            - name: config
              mountPath: /opt/airflow/airflow.cfg
              subPath: airflow.cfg
            - name: dags
              mountPath: /opt/airflow/dags
            - name: logs
              mountPath: /opt/airflow/logs
        - name: git-sync
          image: ${AIRFLOW_GIT_SYNC_IMAGE}
          command: ["/bin/sh", "/scripts/git-sync.sh"]
          env:
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: argus-airflow-${WORKSPACE_NAME}
                  key: gitlab-token
          volumeMounts:
            - name: dags
              mountPath: /opt/airflow/dags
            - name: git-repo
              mountPath: /opt/airflow/git-repo
            - name: git-sync-script
              mountPath: /scripts
      volumes:
        - name: config
          configMap:
            name: argus-airflow-${WORKSPACE_NAME}-config
        - name: git-sync-script
          configMap:
            name: argus-airflow-${WORKSPACE_NAME}-config
            items:
              - key: git-sync.sh
                path: git-sync.sh
                mode: 0755
        - name: dags
          persistentVolumeClaim:
            claimName: argus-airflow-${WORKSPACE_NAME}-dags
        - name: logs
          persistentVolumeClaim:
            claimName: argus-airflow-${WORKSPACE_NAME}-logs
        - name: git-repo
          emptyDir: {}
