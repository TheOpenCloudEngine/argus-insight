apiVersion: apps/v1
kind: Deployment
metadata:
  name: argus-mindsdb-${WORKSPACE_NAME}
  namespace: ${K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: mindsdb
    app.kubernetes.io/instance: ${WORKSPACE_NAME}
    app.kubernetes.io/part-of: argus-insight
    argus-insight/workspace: ${WORKSPACE_NAME}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mindsdb
      app.kubernetes.io/instance: ${WORKSPACE_NAME}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mindsdb
        app.kubernetes.io/instance: ${WORKSPACE_NAME}
        app.kubernetes.io/part-of: argus-insight
        argus-insight/workspace: ${WORKSPACE_NAME}
    spec:
      containers:
        - name: mindsdb
          image: ${MINDSDB_IMAGE}
          ports:
            - name: http
              containerPort: 47334
              protocol: TCP
            - name: mysql
              containerPort: 47335
              protocol: TCP
            - name: mongodb
              containerPort: 47336
              protocol: TCP
          resources:
            requests:
              cpu: "${MINDSDB_CPU_REQUEST}"
              memory: "${MINDSDB_MEMORY_REQUEST}"
            limits:
              cpu: "${MINDSDB_CPU_LIMIT}"
              memory: "${MINDSDB_MEMORY_LIMIT}"
          livenessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /root/mindsdb
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: argus-mindsdb-${WORKSPACE_NAME}-data
