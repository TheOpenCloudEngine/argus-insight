apiVersion: apps/v1
kind: Deployment
metadata:
  name: argus-seldon-${WORKSPACE_NAME}
  namespace: ${K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: seldon
    app.kubernetes.io/instance: ${WORKSPACE_NAME}
    app.kubernetes.io/part-of: argus-insight
    argus-insight/workspace: ${WORKSPACE_NAME}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: seldon
      app.kubernetes.io/instance: ${WORKSPACE_NAME}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seldon
        app.kubernetes.io/instance: ${WORKSPACE_NAME}
        app.kubernetes.io/part-of: argus-insight
        argus-insight/workspace: ${WORKSPACE_NAME}
    spec:
      containers:
        - name: seldon-operator
          image: ${SELDON_IMAGE}
          args:
            - --enable-leader-election=false
            - --single-namespace=true
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 8443
              protocol: TCP
          resources:
            requests:
              cpu: "${SELDON_CPU_REQUEST}"
              memory: "${SELDON_MEMORY_REQUEST}"
            limits:
              cpu: "${SELDON_CPU_LIMIT}"
              memory: "${SELDON_MEMORY_LIMIT}"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
