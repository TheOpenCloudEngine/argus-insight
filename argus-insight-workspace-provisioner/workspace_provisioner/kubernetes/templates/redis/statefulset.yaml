apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: argus-redis-${WORKSPACE_NAME}
  namespace: ${K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/instance: ${WORKSPACE_NAME}
    app.kubernetes.io/part-of: argus-insight
    argus-insight/workspace: ${WORKSPACE_NAME}
spec:
  serviceName: argus-redis-${WORKSPACE_NAME}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
      app.kubernetes.io/instance: ${WORKSPACE_NAME}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/instance: ${WORKSPACE_NAME}
        app.kubernetes.io/part-of: argus-insight
        argus-insight/workspace: ${WORKSPACE_NAME}
    spec:
      containers:
        - name: redis
          image: ${REDIS_IMAGE}
          args:
            - redis-server
            - --maxmemory
            - "${REDIS_MAXMEMORY}"
            - --maxmemory-policy
            - allkeys-lru
            - --appendonly
            - "yes"
            - --dir
            - /data
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          resources:
            requests:
              cpu: "${REDIS_CPU_REQUEST}"
              memory: "${REDIS_MEMORY_REQUEST}"
            limits:
              cpu: "${REDIS_CPU_LIMIT}"
              memory: "${REDIS_MEMORY_LIMIT}"
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: argus-redis-${WORKSPACE_NAME}-data
