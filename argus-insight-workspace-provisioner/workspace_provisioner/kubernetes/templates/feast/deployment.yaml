apiVersion: apps/v1
kind: Deployment
metadata:
  name: argus-feast-${WORKSPACE_NAME}
  namespace: ${K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: feast
    app.kubernetes.io/instance: ${WORKSPACE_NAME}
    app.kubernetes.io/part-of: argus-insight
    argus-insight/workspace: ${WORKSPACE_NAME}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: feast
      app.kubernetes.io/instance: ${WORKSPACE_NAME}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: feast
        app.kubernetes.io/instance: ${WORKSPACE_NAME}
        app.kubernetes.io/part-of: argus-insight
        argus-insight/workspace: ${WORKSPACE_NAME}
    spec:
      containers:
        - name: feast
          image: ${FEAST_IMAGE}
          args: ["serve", "-h", "0.0.0.0", "-p", "6566"]
          ports:
            - name: http
              containerPort: 6566
              protocol: TCP
          resources:
            requests:
              cpu: "${FEAST_CPU_REQUEST}"
              memory: "${FEAST_MEMORY_REQUEST}"
            limits:
              cpu: "${FEAST_CPU_LIMIT}"
              memory: "${FEAST_MEMORY_LIMIT}"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
