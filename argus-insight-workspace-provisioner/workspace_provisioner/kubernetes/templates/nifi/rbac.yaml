apiVersion: v1
kind: ServiceAccount
metadata:
  name: argus-nifi-${WORKSPACE_NAME}
  namespace: ${K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: nifi
    app.kubernetes.io/instance: ${WORKSPACE_NAME}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argus-nifi-${WORKSPACE_NAME}-lease
  namespace: ${K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: nifi
    app.kubernetes.io/instance: ${WORKSPACE_NAME}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argus-nifi-${WORKSPACE_NAME}-lease
  namespace: ${K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: nifi
    app.kubernetes.io/instance: ${WORKSPACE_NAME}
subjects:
  - kind: ServiceAccount
    name: argus-nifi-${WORKSPACE_NAME}
    namespace: ${K8S_NAMESPACE}
roleRef:
  kind: Role
  name: argus-nifi-${WORKSPACE_NAME}-lease
  apiGroup: rbac.authorization.k8s.io
