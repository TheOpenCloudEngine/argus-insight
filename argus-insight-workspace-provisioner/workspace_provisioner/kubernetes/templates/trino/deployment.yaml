apiVersion: apps/v1
kind: Deployment
metadata:
  name: argus-trino-${WORKSPACE_NAME}
  namespace: ${K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: trino
    app.kubernetes.io/instance: ${WORKSPACE_NAME}
    app.kubernetes.io/component: coordinator
    app.kubernetes.io/part-of: argus-insight
    argus-insight/workspace: ${WORKSPACE_NAME}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: trino
      app.kubernetes.io/instance: ${WORKSPACE_NAME}
      app.kubernetes.io/component: coordinator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trino
        app.kubernetes.io/instance: ${WORKSPACE_NAME}
        app.kubernetes.io/component: coordinator
        app.kubernetes.io/part-of: argus-insight
        argus-insight/workspace: ${WORKSPACE_NAME}
    spec:
      containers:
        - name: coordinator
          image: ${TRINO_IMAGE}
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: "${TRINO_COORDINATOR_CPU_REQUEST}"
              memory: "${TRINO_COORDINATOR_MEMORY_REQUEST}"
            limits:
              cpu: "${TRINO_COORDINATOR_CPU_LIMIT}"
              memory: "${TRINO_COORDINATOR_MEMORY_LIMIT}"
          volumeMounts:
            - name: config
              mountPath: /etc/trino/config.properties
              subPath: config-coordinator.properties
            - name: config
              mountPath: /etc/trino/jvm.config
              subPath: jvm.config
            - name: config
              mountPath: /etc/trino/node.properties
              subPath: node.properties
            - name: config
              mountPath: /etc/trino/log.properties
              subPath: log.properties
          readinessProbe:
            httpGet:
              path: /v1/info
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/info
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: argus-trino-${WORKSPACE_NAME}-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argus-trino-${WORKSPACE_NAME}-worker
  namespace: ${K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: trino
    app.kubernetes.io/instance: ${WORKSPACE_NAME}
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: argus-insight
    argus-insight/workspace: ${WORKSPACE_NAME}
spec:
  replicas: ${TRINO_WORKER_REPLICAS}
  selector:
    matchLabels:
      app.kubernetes.io/name: trino
      app.kubernetes.io/instance: ${WORKSPACE_NAME}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trino
        app.kubernetes.io/instance: ${WORKSPACE_NAME}
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: argus-insight
        argus-insight/workspace: ${WORKSPACE_NAME}
    spec:
      containers:
        - name: worker
          image: ${TRINO_IMAGE}
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: "${TRINO_WORKER_CPU_REQUEST}"
              memory: "${TRINO_WORKER_MEMORY_REQUEST}"
            limits:
              cpu: "${TRINO_WORKER_CPU_LIMIT}"
              memory: "${TRINO_WORKER_MEMORY_LIMIT}"
          volumeMounts:
            - name: config
              mountPath: /etc/trino/config.properties
              subPath: config-worker.properties
            - name: config
              mountPath: /etc/trino/jvm.config
              subPath: jvm.config
            - name: config
              mountPath: /etc/trino/node.properties
              subPath: node.properties
            - name: config
              mountPath: /etc/trino/log.properties
              subPath: log.properties
      volumes:
        - name: config
          configMap:
            name: argus-trino-${WORKSPACE_NAME}-config
