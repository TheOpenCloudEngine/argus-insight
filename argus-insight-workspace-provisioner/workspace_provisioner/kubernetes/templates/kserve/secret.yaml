apiVersion: v1
kind: Secret
metadata:
  name: argus-kserve-${WORKSPACE_NAME}
  namespace: ${K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: kserve
    app.kubernetes.io/instance: ${WORKSPACE_NAME}
    app.kubernetes.io/part-of: argus-insight
    argus-insight/workspace: ${WORKSPACE_NAME}
type: Opaque
stringData:
  minio-endpoint: "${MINIO_ENDPOINT}"
  minio-access-key: "${MINIO_ACCESS_KEY}"
  minio-secret-key: "${MINIO_SECRET_KEY}"
---
apiVersion: v1
kind: Secret
metadata:
  name: argus-kserve-${WORKSPACE_NAME}-sa
  namespace: ${K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: kserve
    app.kubernetes.io/instance: ${WORKSPACE_NAME}
    app.kubernetes.io/part-of: argus-insight
    argus-insight/workspace: ${WORKSPACE_NAME}
  annotations:
    serving.kserve.io/s3-endpoint: "${MINIO_ENDPOINT}"
    serving.kserve.io/s3-usehttps: "0"
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "${MINIO_ACCESS_KEY}"
  AWS_SECRET_ACCESS_KEY: "${MINIO_SECRET_KEY}"
