apiVersion: apps/v1
kind: Deployment
metadata:
  name: argus-ollama-${WORKSPACE_NAME}
  namespace: ${K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/instance: ${WORKSPACE_NAME}
    app.kubernetes.io/part-of: argus-insight
    argus-insight/workspace: ${WORKSPACE_NAME}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama
      app.kubernetes.io/instance: ${WORKSPACE_NAME}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama
        app.kubernetes.io/instance: ${WORKSPACE_NAME}
        app.kubernetes.io/part-of: argus-insight
        argus-insight/workspace: ${WORKSPACE_NAME}
    spec:
      containers:
        - name: ollama
          image: ${OLLAMA_IMAGE}
          command: ["/bin/sh", "-c"]
          args:
            - |
              # Start ollama server in background
              ollama serve &
              SERVER_PID=$$!

              # Wait for server to be ready
              echo "[ollama] Waiting for server..."
              for i in $$(seq 1 60); do
                curl -s http://localhost:11434/api/tags >/dev/null 2>&1 && break
                sleep 1
              done

              # Pull default model if specified and not already present
              DEFAULT_MODEL="${OLLAMA_DEFAULT_MODEL}"
              if [ -n "$$DEFAULT_MODEL" ]; then
                echo "[ollama] Pulling model: $$DEFAULT_MODEL"
                ollama pull "$$DEFAULT_MODEL" || echo "[ollama] Pull failed, continuing..."
                echo "[ollama] Model ready: $$DEFAULT_MODEL"
              fi

              # Wait for server process
              wait $$SERVER_PID
          ports:
            - name: http
              containerPort: 11434
              protocol: TCP
          resources:
            requests:
              cpu: "${OLLAMA_CPU_REQUEST}"
              memory: "${OLLAMA_MEMORY_REQUEST}"
            limits:
              cpu: "${OLLAMA_CPU_LIMIT}"
              memory: "${OLLAMA_MEMORY_LIMIT}"
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          readinessProbe:
            httpGet:
              path: /api/tags
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: argus-ollama-${WORKSPACE_NAME}-models
