apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: argus-kafka-${WORKSPACE_NAME}
  namespace: ${K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/instance: ${WORKSPACE_NAME}
    app.kubernetes.io/part-of: argus-insight
    argus-insight/workspace: ${WORKSPACE_NAME}
spec:
  serviceName: argus-kafka-${WORKSPACE_NAME}-headless
  replicas: ${KAFKA_REPLICAS}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka
      app.kubernetes.io/instance: ${WORKSPACE_NAME}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka
        app.kubernetes.io/instance: ${WORKSPACE_NAME}
        app.kubernetes.io/part-of: argus-insight
        argus-insight/workspace: ${WORKSPACE_NAME}
    spec:
      containers:
        - name: kafka
          image: ${KAFKA_IMAGE}
          ports:
            - name: client
              containerPort: 9092
            - name: controller
              containerPort: 9093
          envFrom:
            - configMapRef:
                name: argus-kafka-${WORKSPACE_NAME}-config
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: KAFKA_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['apps.kubernetes.io/pod-index']
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://$(POD_NAME).argus-kafka-${WORKSPACE_NAME}-headless.${K8S_NAMESPACE}.svc.cluster.local:9092"
          command:
            - bash
            - -c
            - |
              # Derive node.id from pod ordinal index
              export KAFKA_NODE_ID=$${HOSTNAME##*-}
              # Format storage
              if [ ! -f /var/kafka-logs/meta.properties ]; then
                /opt/kafka/bin/kafka-storage.sh format \
                  -t $${CLUSTER_ID} \
                  -c /opt/kafka/config/kraft/server.properties \
                  --ignore-formatted 2>/dev/null || true
              fi
              exec /opt/kafka/bin/kafka-server-start.sh /opt/kafka/config/kraft/server.properties \
                --override node.id=$${KAFKA_NODE_ID} \
                --override process.roles=$${KAFKA_PROCESS_ROLES} \
                --override controller.quorum.voters=$${KAFKA_CONTROLLER_QUORUM_VOTERS} \
                --override controller.listener.names=$${KAFKA_CONTROLLER_LISTENER_NAMES} \
                --override listener.security.protocol.map=$${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP} \
                --override listeners=$${KAFKA_LISTENERS} \
                --override advertised.listeners=$${KAFKA_ADVERTISED_LISTENERS} \
                --override log.dirs=$${KAFKA_LOG_DIRS} \
                --override offsets.topic.replication.factor=$${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR} \
                --override transaction.state.log.replication.factor=$${KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR} \
                --override transaction.state.log.min.isr=$${KAFKA_TRANSACTION_STATE_LOG_MIN_ISR} \
                --override min.insync.replicas=$${KAFKA_MIN_INSYNC_REPLICAS} \
                --override auto.create.topics.enable=$${KAFKA_AUTO_CREATE_TOPICS_ENABLE} \
                --override log.retention.hours=$${KAFKA_LOG_RETENTION_HOURS}
          resources:
            requests:
              cpu: "${KAFKA_CPU_REQUEST}"
              memory: "${KAFKA_MEMORY_REQUEST}"
            limits:
              cpu: "${KAFKA_CPU_LIMIT}"
              memory: "${KAFKA_MEMORY_LIMIT}"
          readinessProbe:
            tcpSocket:
              port: client
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: client
            initialDelaySeconds: 60
            periodSeconds: 30
          volumeMounts:
            - name: kafka-data
              mountPath: /var/kafka-logs
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: ${KAFKA_STORAGE_SIZE}
