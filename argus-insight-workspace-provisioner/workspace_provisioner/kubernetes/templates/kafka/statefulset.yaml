apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: argus-kafka-${WORKSPACE_NAME}
  namespace: ${K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/instance: ${WORKSPACE_NAME}
    app.kubernetes.io/part-of: argus-insight
    argus-insight/workspace: ${WORKSPACE_NAME}
spec:
  serviceName: argus-kafka-${WORKSPACE_NAME}-headless
  replicas: ${KAFKA_REPLICAS}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka
      app.kubernetes.io/instance: ${WORKSPACE_NAME}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka
        app.kubernetes.io/instance: ${WORKSPACE_NAME}
        app.kubernetes.io/part-of: argus-insight
        argus-insight/workspace: ${WORKSPACE_NAME}
    spec:
      containers:
        - name: kafka
          image: ${KAFKA_IMAGE}
          ports:
            - name: client
              containerPort: 9092
            - name: controller
              containerPort: 9093
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: KAFKA_NODE_ID
              value: "${KAFKA_NODE_ID_PLACEHOLDER}"
            - name: CLUSTER_ID
              value: "${KAFKA_CLUSTER_ID}"
            - name: KAFKA_PROCESS_ROLES
              value: "${KAFKA_PROCESS_ROLES}"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "${KAFKA_CONTROLLER_QUORUM_VOTERS}"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "${KAFKA_REPLICATION_FACTOR}"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "${KAFKA_REPLICATION_FACTOR}"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "${KAFKA_MIN_ISR}"
            - name: KAFKA_LOG_DIRS
              value: "/var/kafka-logs"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_LOG_RETENTION_HOURS
              value: "168"
          command:
            - bash
            - -c
            - |
              # Derive node.id from pod ordinal (e.g. argus-kafka-mlops7-0 → 0)
              export KAFKA_NODE_ID=$${HOSTNAME##*-}
              # Set advertised.listeners with pod-specific hostname
              export KAFKA_ADVERTISED_LISTENERS="PLAINTEXT://$${HOSTNAME}.argus-kafka-${WORKSPACE_NAME}-headless.${K8S_NAMESPACE}.svc.cluster.local:9092"
              # Run default entrypoint
              exec /etc/kafka/docker/run
          resources:
            requests:
              cpu: "${KAFKA_CPU_REQUEST}"
              memory: "${KAFKA_MEMORY_REQUEST}"
            limits:
              cpu: "${KAFKA_CPU_LIMIT}"
              memory: "${KAFKA_MEMORY_LIMIT}"
          readinessProbe:
            tcpSocket:
              port: client
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: client
            initialDelaySeconds: 60
            periodSeconds: 30
          volumeMounts:
            - name: kafka-data
              mountPath: /var/kafka-logs
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: ${KAFKA_STORAGE_SIZE}
