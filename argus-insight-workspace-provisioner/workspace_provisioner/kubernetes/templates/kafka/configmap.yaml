apiVersion: v1
kind: ConfigMap
metadata:
  name: argus-kafka-${WORKSPACE_NAME}-config
  namespace: ${K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/instance: ${WORKSPACE_NAME}
    app.kubernetes.io/part-of: argus-insight
    argus-insight/workspace: ${WORKSPACE_NAME}
data:
  KAFKA_KRAFT_CLUSTER_ID: ${KAFKA_CLUSTER_ID}
  KAFKA_PROCESS_ROLES: ${KAFKA_PROCESS_ROLES}
  KAFKA_CONTROLLER_QUORUM_VOTERS: ${KAFKA_CONTROLLER_QUORUM_VOTERS}
  KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "${KAFKA_REPLICATION_FACTOR}"
  KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "${KAFKA_REPLICATION_FACTOR}"
  KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "${KAFKA_MIN_ISR}"
  KAFKA_MIN_INSYNC_REPLICAS: "${KAFKA_MIN_ISR}"
  KAFKA_LOG_DIRS: /var/kafka-logs
  KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
  KAFKA_LOG_RETENTION_HOURS: "168"
  CLUSTER_ID: ${KAFKA_CLUSTER_ID}
