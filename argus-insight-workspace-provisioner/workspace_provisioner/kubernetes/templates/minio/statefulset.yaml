apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: argus-minio-${WORKSPACE_NAME}
  namespace: ${K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/instance: ${WORKSPACE_NAME}
    app.kubernetes.io/part-of: argus-insight
    argus-insight/workspace: ${WORKSPACE_NAME}
spec:
  serviceName: argus-minio-${WORKSPACE_NAME}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
      app.kubernetes.io/instance: ${WORKSPACE_NAME}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
        app.kubernetes.io/instance: ${WORKSPACE_NAME}
        app.kubernetes.io/part-of: argus-insight
        argus-insight/workspace: ${WORKSPACE_NAME}
    spec:
      containers:
        - name: minio
          image: ${MINIO_IMAGE}
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: argus-minio-${WORKSPACE_NAME}
                  key: root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: argus-minio-${WORKSPACE_NAME}
                  key: root-password
          ports:
            - name: api
              containerPort: 9000
              protocol: TCP
            - name: console
              containerPort: 9001
              protocol: TCP
          resources:
            requests:
              cpu: "${MINIO_CPU_REQUEST}"
              memory: "${MINIO_MEMORY_REQUEST}"
            limits:
              cpu: "${MINIO_CPU_LIMIT}"
              memory: "${MINIO_MEMORY_LIMIT}"
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: api
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: argus-minio-${WORKSPACE_NAME}-data
