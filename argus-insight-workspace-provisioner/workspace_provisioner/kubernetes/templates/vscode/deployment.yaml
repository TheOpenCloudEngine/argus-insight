apiVersion: apps/v1
kind: Deployment
metadata:
  name: argus-vscode-${INSTANCE_ID}
  namespace: ${K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: code-server
    app.kubernetes.io/instance: "${INSTANCE_ID}"
    app.kubernetes.io/part-of: argus-insight
    argus-insight/component: vscode
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: code-server
      app.kubernetes.io/instance: "${INSTANCE_ID}"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: code-server
        app.kubernetes.io/instance: "${INSTANCE_ID}"
        app.kubernetes.io/part-of: argus-insight
        argus-insight/component: vscode
    spec:
      containers:
        - name: code-server
          image: codercom/code-server:4.96.4
          command: ["/bin/sh", "-c"]
          args:
            - |
              # Install Python if not present
              if ! command -v python3 > /dev/null 2>&1; then
                sudo apt-get update -qq && sudo apt-get install -y -qq python3 python3-pip python3-venv > /dev/null 2>&1
              fi

              # pip config
              mkdir -p /home/coder/.config/pip
              cat > /home/coder/.config/pip/pip.conf << 'PIPCONF'
              [global]
              index-url = https://pypi.org/simple
              trusted-host = pypi.org
              PIPCONF

              # Default VS Code settings (only if not already customized)
              SETTINGS_DIR=/home/coder/.local/share/code-server/User
              if [ ! -f "$SETTINGS_DIR/settings.json" ]; then
                mkdir -p "$SETTINGS_DIR"
                cat > "$SETTINGS_DIR/settings.json" << 'SETTINGS'
              {
                "workbench.colorTheme": "Default Dark Modern",
                "editor.fontSize": 14,
                "editor.minimap.enabled": false,
                "terminal.integrated.fontSize": 13
              }
              SETTINGS
              fi

              exec /usr/bin/entrypoint.sh --auth none --bind-addr 0.0.0.0:8080 /workspace
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
          volumeMounts:
            - name: workspace-vol
              mountPath: /workspace
              mountPropagation: HostToContainer
            - name: data-vol
              mountPath: /data
              mountPropagation: HostToContainer
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
        # Sidecar 1: Mount workspace bucket to /workspace
        - name: s3fs-workspace
          image: efrecon/s3fs:1.94
          securityContext:
            privileged: true
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: argus-vscode-${INSTANCE_ID}
                  key: aws-access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: argus-vscode-${INSTANCE_ID}
                  key: aws-secret-key
            - name: S3_BUCKET
              value: "${WORKSPACE_BUCKET}"
            - name: S3_ENDPOINT
              value: "${S3_ENDPOINT}"
            - name: S3_USE_SSL
              value: "${S3_USE_SSL}"
          command:
            - /bin/sh
            - -c
            - |
              echo "$${AWS_ACCESS_KEY_ID}:$${AWS_SECRET_ACCESS_KEY}" > /etc/passwd-s3fs
              chmod 600 /etc/passwd-s3fs
              SSL_OPT=""
              if [ "$${S3_USE_SSL}" = "false" ]; then
                SSL_OPT="-o no_check_certificate -o use_path_request_style"
              else
                SSL_OPT="-o use_path_request_style"
              fi
              exec s3fs "$${S3_BUCKET}" /workspace \
                -o passwd_file=/etc/passwd-s3fs \
                -o url="$${S3_ENDPOINT}" \
                -o allow_other \
                $${SSL_OPT} \
                -f
          volumeMounts:
            - name: workspace-vol
              mountPath: /workspace
              mountPropagation: Bidirectional
        # Sidecar 2: Mount personal bucket to /data
        - name: s3fs-data
          image: efrecon/s3fs:1.94
          securityContext:
            privileged: true
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: argus-vscode-${INSTANCE_ID}
                  key: aws-access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: argus-vscode-${INSTANCE_ID}
                  key: aws-secret-key
            - name: S3_BUCKET
              value: "${USER_BUCKET}"
            - name: S3_ENDPOINT
              value: "${S3_ENDPOINT}"
            - name: S3_USE_SSL
              value: "${S3_USE_SSL}"
          command:
            - /bin/sh
            - -c
            - |
              echo "$${AWS_ACCESS_KEY_ID}:$${AWS_SECRET_ACCESS_KEY}" > /etc/passwd-s3fs
              chmod 600 /etc/passwd-s3fs
              SSL_OPT=""
              if [ "$${S3_USE_SSL}" = "false" ]; then
                SSL_OPT="-o no_check_certificate -o use_path_request_style"
              else
                SSL_OPT="-o use_path_request_style"
              fi
              exec s3fs "$${S3_BUCKET}" /data \
                -o passwd_file=/etc/passwd-s3fs \
                -o url="$${S3_ENDPOINT}" \
                -o allow_other \
                $${SSL_OPT} \
                -f
          volumeMounts:
            - name: data-vol
              mountPath: /data
              mountPropagation: Bidirectional
      volumes:
        - name: workspace-vol
          emptyDir: {}
        - name: data-vol
          emptyDir: {}
