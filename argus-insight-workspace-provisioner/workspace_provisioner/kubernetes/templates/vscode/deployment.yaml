apiVersion: apps/v1
kind: Deployment
metadata:
  name: argus-vscode-${INSTANCE_ID}
  namespace: ${K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: code-server
    app.kubernetes.io/instance: "${INSTANCE_ID}"
    app.kubernetes.io/part-of: argus-insight
    argus-insight/component: vscode
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: code-server
      app.kubernetes.io/instance: "${INSTANCE_ID}"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: code-server
        app.kubernetes.io/instance: "${INSTANCE_ID}"
        app.kubernetes.io/part-of: argus-insight
        argus-insight/component: vscode
    spec:
      containers:
        - name: code-server
          image: codercom/code-server:4.96.4
          args:
            - --auth
            - none
            - --bind-addr
            - 0.0.0.0:8080
            - /workspace
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
              mountPropagation: HostToContainer
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
        - name: s3fs-mount
          image: efrecon/s3fs:1.94
          securityContext:
            privileged: true
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: argus-vscode-${INSTANCE_ID}
                  key: aws-access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: argus-vscode-${INSTANCE_ID}
                  key: aws-secret-key
            - name: S3_BUCKET
              value: "user-${USERNAME}"
            - name: S3_ENDPOINT
              value: "${S3_ENDPOINT}"
            - name: S3_USE_SSL
              value: "${S3_USE_SSL}"
          command:
            - /bin/sh
            - -c
            - |
              echo "$${AWS_ACCESS_KEY_ID}:$${AWS_SECRET_ACCESS_KEY}" > /etc/passwd-s3fs
              chmod 600 /etc/passwd-s3fs
              SSL_OPT=""
              if [ "$${S3_USE_SSL}" = "false" ]; then
                SSL_OPT="-o no_check_certificate -o use_path_request_style"
              else
                SSL_OPT="-o use_path_request_style"
              fi
              exec s3fs "$${S3_BUCKET}" /workspace \
                -o passwd_file=/etc/passwd-s3fs \
                -o url="$${S3_ENDPOINT}" \
                -o allow_other \
                $${SSL_OPT} \
                -f
          volumeMounts:
            - name: workspace
              mountPath: /workspace
              mountPropagation: Bidirectional
      volumes:
        - name: workspace
          emptyDir: {}
