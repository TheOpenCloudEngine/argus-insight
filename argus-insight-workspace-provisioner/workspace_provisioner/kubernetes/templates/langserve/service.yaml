apiVersion: v1
kind: Service
metadata:
  name: argus-langserve-${INSTANCE_ID}
  namespace: ${K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: langserve
    app.kubernetes.io/instance: "${INSTANCE_ID}"
    app.kubernetes.io/part-of: argus-insight
    argus-insight/workspace: ${WORKSPACE_NAME}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: langserve
    app.kubernetes.io/instance: "${INSTANCE_ID}"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argus-langserve-${INSTANCE_ID}
  namespace: ${K8S_NAMESPACE}
  annotations:
    ${AUTH_ANNOTATION}
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
spec:
  ingressClassName: nginx
  rules:
    - host: ${HOSTNAME}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argus-langserve-${INSTANCE_ID}
                port:
                  name: http
