apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-${WORKSPACE_NAME}-db
  namespace: ${K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: mlflow-db
    app.kubernetes.io/instance: ${WORKSPACE_NAME}
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: argus-insight
    argus-insight/workspace: ${WORKSPACE_NAME}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mlflow-db
      app.kubernetes.io/instance: ${WORKSPACE_NAME}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mlflow-db
        app.kubernetes.io/instance: ${WORKSPACE_NAME}
        app.kubernetes.io/part-of: argus-insight
        argus-insight/workspace: ${WORKSPACE_NAME}
    spec:
      containers:
        - name: postgres
          image: ${MLFLOW_POSTGRES_IMAGE}
          env:
            - name: POSTGRES_DB
              value: mlflow
            - name: POSTGRES_USER
              value: mlflow
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mlflow-${WORKSPACE_NAME}
                  key: postgres-password
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "mlflow"]
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: mlflow-${WORKSPACE_NAME}-db
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-${WORKSPACE_NAME}-db
  namespace: ${K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: mlflow-db
    app.kubernetes.io/instance: ${WORKSPACE_NAME}
    app.kubernetes.io/part-of: argus-insight
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
  selector:
    app.kubernetes.io/name: mlflow-db
    app.kubernetes.io/instance: ${WORKSPACE_NAME}
