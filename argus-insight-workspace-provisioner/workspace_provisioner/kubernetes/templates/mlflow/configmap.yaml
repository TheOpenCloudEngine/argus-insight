apiVersion: v1
kind: ConfigMap
metadata:
  name: argus-mlflow-${WORKSPACE_NAME}-custom-config
  namespace: ${K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: mlflow
    app.kubernetes.io/instance: ${WORKSPACE_NAME}
    app.kubernetes.io/part-of: argus-insight
    argus-insight/workspace: ${WORKSPACE_NAME}
data:
  MLFLOW_WORKERS: "1"
  GUNICORN_CMD_ARGS: "--timeout 300 --keep-alive 5"
  MLFLOW_LOGGING_LEVEL: "INFO"
  MLFLOW_SERVE_ARTIFACTS: "true"
