apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: argus-starrocks-${WORKSPACE_NAME}-fe
  namespace: ${K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: starrocks
    app.kubernetes.io/instance: ${WORKSPACE_NAME}
    app.kubernetes.io/component: fe
    app.kubernetes.io/part-of: argus-insight
    argus-insight/workspace: ${WORKSPACE_NAME}
spec:
  serviceName: argus-starrocks-${WORKSPACE_NAME}-fe
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: starrocks
      app.kubernetes.io/instance: ${WORKSPACE_NAME}
      app.kubernetes.io/component: fe
  template:
    metadata:
      labels:
        app.kubernetes.io/name: starrocks
        app.kubernetes.io/instance: ${WORKSPACE_NAME}
        app.kubernetes.io/component: fe
        app.kubernetes.io/part-of: argus-insight
        argus-insight/workspace: ${WORKSPACE_NAME}
    spec:
      containers:
        - name: fe
          image: ${STARROCKS_FE_IMAGE}
          ports:
            - name: http
              containerPort: 8030
            - name: mysql
              containerPort: 9030
            - name: rpc
              containerPort: 9020
            - name: edit-log
              containerPort: 9010
          resources:
            requests:
              cpu: "${STARROCKS_FE_CPU_REQUEST}"
              memory: "${STARROCKS_FE_MEMORY_REQUEST}"
            limits:
              cpu: "${STARROCKS_FE_CPU_LIMIT}"
              memory: "${STARROCKS_FE_MEMORY_LIMIT}"
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          volumeMounts:
            - name: fe-meta
              mountPath: /opt/starrocks/fe/meta
            - name: config
              mountPath: /opt/starrocks/fe/conf/fe.conf
              subPath: fe.conf
      volumes:
        - name: config
          configMap:
            name: argus-starrocks-${WORKSPACE_NAME}-config
  volumeClaimTemplates:
    - metadata:
        name: fe-meta
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: ${STARROCKS_FE_STORAGE_SIZE}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: argus-starrocks-${WORKSPACE_NAME}-be
  namespace: ${K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: starrocks
    app.kubernetes.io/instance: ${WORKSPACE_NAME}
    app.kubernetes.io/component: be
    app.kubernetes.io/part-of: argus-insight
    argus-insight/workspace: ${WORKSPACE_NAME}
spec:
  serviceName: argus-starrocks-${WORKSPACE_NAME}-be
  replicas: ${STARROCKS_BE_REPLICAS}
  selector:
    matchLabels:
      app.kubernetes.io/name: starrocks
      app.kubernetes.io/instance: ${WORKSPACE_NAME}
      app.kubernetes.io/component: be
  template:
    metadata:
      labels:
        app.kubernetes.io/name: starrocks
        app.kubernetes.io/instance: ${WORKSPACE_NAME}
        app.kubernetes.io/component: be
        app.kubernetes.io/part-of: argus-insight
        argus-insight/workspace: ${WORKSPACE_NAME}
    spec:
      containers:
        - name: be
          image: ${STARROCKS_BE_IMAGE}
          ports:
            - name: http
              containerPort: 8040
            - name: heartbeat
              containerPort: 9050
            - name: be-port
              containerPort: 9060
            - name: brpc
              containerPort: 8060
          resources:
            requests:
              cpu: "${STARROCKS_BE_CPU_REQUEST}"
              memory: "${STARROCKS_BE_MEMORY_REQUEST}"
            limits:
              cpu: "${STARROCKS_BE_CPU_LIMIT}"
              memory: "${STARROCKS_BE_MEMORY_LIMIT}"
          volumeMounts:
            - name: be-storage
              mountPath: /opt/starrocks/be/storage
            - name: config
              mountPath: /opt/starrocks/be/conf/be.conf
              subPath: be.conf
      volumes:
        - name: config
          configMap:
            name: argus-starrocks-${WORKSPACE_NAME}-config
  volumeClaimTemplates:
    - metadata:
        name: be-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: ${STARROCKS_BE_STORAGE_SIZE}
