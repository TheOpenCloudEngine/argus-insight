apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: argus-labelstudio-${WORKSPACE_NAME}-data
  namespace: ${K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: labelstudio
    app.kubernetes.io/instance: ${WORKSPACE_NAME}
    app.kubernetes.io/part-of: argus-insight
    argus-insight/workspace: ${WORKSPACE_NAME}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: ${LABELSTUDIO_STORAGE_SIZE}
