apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: argus-mariadb-${WORKSPACE_NAME}
  namespace: ${K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: mariadb
    app.kubernetes.io/instance: ${WORKSPACE_NAME}
    app.kubernetes.io/part-of: argus-insight
    argus-insight/workspace: ${WORKSPACE_NAME}
spec:
  serviceName: argus-mariadb-${WORKSPACE_NAME}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mariadb
      app.kubernetes.io/instance: ${WORKSPACE_NAME}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mariadb
        app.kubernetes.io/instance: ${WORKSPACE_NAME}
        app.kubernetes.io/part-of: argus-insight
        argus-insight/workspace: ${WORKSPACE_NAME}
    spec:
      containers:
        - name: mariadb
          image: ${MARIA_IMAGE}
          env:
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: argus-mariadb-${WORKSPACE_NAME}
                  key: root-password
            - name: MARIADB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: argus-mariadb-${WORKSPACE_NAME}
                  key: database
            - name: MARIADB_USER
              valueFrom:
                secretKeyRef:
                  name: argus-mariadb-${WORKSPACE_NAME}
                  key: username
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: argus-mariadb-${WORKSPACE_NAME}
                  key: password
          ports:
            - name: mysql
              containerPort: 3306
          resources:
            requests:
              cpu: "${MARIA_CPU_REQUEST}"
              memory: "${MARIA_MEMORY_REQUEST}"
            limits:
              cpu: "${MARIA_CPU_LIMIT}"
              memory: "${MARIA_MEMORY_LIMIT}"
          readinessProbe:
            exec:
              command: ["healthcheck.sh", "--connect", "--innodb_initialized"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["healthcheck.sh", "--connect", "--innodb_initialized"]
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: ${MARIA_STORAGE_SIZE}
