apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: argus-postgresql-${WORKSPACE_NAME}
  namespace: ${K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/instance: ${WORKSPACE_NAME}
    app.kubernetes.io/part-of: argus-insight
    argus-insight/workspace: ${WORKSPACE_NAME}
spec:
  serviceName: argus-postgresql-${WORKSPACE_NAME}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgresql
      app.kubernetes.io/instance: ${WORKSPACE_NAME}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgresql
        app.kubernetes.io/instance: ${WORKSPACE_NAME}
        app.kubernetes.io/part-of: argus-insight
        argus-insight/workspace: ${WORKSPACE_NAME}
    spec:
      containers:
        - name: postgresql
          image: ${PG_IMAGE}
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: argus-postgresql-${WORKSPACE_NAME}
                  key: database
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: argus-postgresql-${WORKSPACE_NAME}
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: argus-postgresql-${WORKSPACE_NAME}
                  key: postgres-password
          ports:
            - name: postgres
              containerPort: 5432
          resources:
            requests:
              cpu: "${PG_CPU_REQUEST}"
              memory: "${PG_MEMORY_REQUEST}"
            limits:
              cpu: "${PG_CPU_LIMIT}"
              memory: "${PG_MEMORY_LIMIT}"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "${PG_DB_USER}"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "${PG_DB_USER}"]
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: ${PG_STORAGE_SIZE}
