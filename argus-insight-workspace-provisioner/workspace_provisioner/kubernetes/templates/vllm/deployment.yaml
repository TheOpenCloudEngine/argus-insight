apiVersion: apps/v1
kind: Deployment
metadata:
  name: argus-vllm-${WORKSPACE_NAME}
  namespace: ${K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: vllm
    app.kubernetes.io/instance: ${WORKSPACE_NAME}
    app.kubernetes.io/part-of: argus-insight
    argus-insight/workspace: ${WORKSPACE_NAME}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm
      app.kubernetes.io/instance: ${WORKSPACE_NAME}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm
        app.kubernetes.io/instance: ${WORKSPACE_NAME}
        app.kubernetes.io/part-of: argus-insight
        argus-insight/workspace: ${WORKSPACE_NAME}
    spec:
      containers:
        - name: vllm
          image: ${VLLM_IMAGE}
          args:
            - --model
            - "${VLLM_MODEL}"
            - --max-model-len
            - "${VLLM_MAX_MODEL_LEN}"
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
          env:
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: argus-vllm-${WORKSPACE_NAME}
                  key: hf-token
                  optional: true
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: "${VLLM_CPU_REQUEST}"
              memory: "${VLLM_MEMORY_REQUEST}"
              nvidia.com/gpu: "${VLLM_GPU_COUNT}"
            limits:
              cpu: "${VLLM_CPU_LIMIT}"
              memory: "${VLLM_MEMORY_LIMIT}"
              nvidia.com/gpu: "${VLLM_GPU_COUNT}"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
