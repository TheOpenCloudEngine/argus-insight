# Argus Catalog Metadata Sync Configuration
# -------------------------------------------

# Argus Catalog Server connection
catalog:
  base_url: "http://localhost:4600/api/v1/catalog"
  timeout: 30

# Sync API server
server:
  host: "0.0.0.0"
  port: 4610

# Platform sync configurations
platforms:
  hive:
    enabled: true
    # Hive Metastore Thrift connection
    metastore_host: "localhost"
    metastore_port: 9083
    # Kerberos authentication (optional)
    kerberos:
      enabled: false
      principal: "hive/_HOST@REALM"
      keytab: "/etc/security/keytabs/hive.service.keytab"
    # Databases to sync (empty = all)
    databases: []
    # Databases to exclude
    exclude_databases:
      - "sys"
      - "information_schema"
    # Sync schedule
    schedule:
      interval_minutes: 60
      enabled: true
    # Dataset origin mapping
    origin: "PROD"
