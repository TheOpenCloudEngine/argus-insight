# Metadata Sync Server configuration
server.host=0.0.0.0
server.port=4610

# Logging
log.level=INFO
log.dir=/var/log/argus-catalog-metadata-sync
log.filename=argus-catalog-metadata-sync.log

# CORS
cors.origins=*

# Database (same as argus-catalog-server)
db.type=postgresql
db.host=localhost
db.port=5432
db.name=argus_catalog
db.username=argus
db.password=argus

# Catalog Server
catalog.base_url=http://localhost:4600/api/v1/catalog
catalog.timeout=30

# Hive Metastore
hive.enabled=true
hive.metastore_host=localhost
hive.metastore_port=9083
hive.kerberos.enabled=false
hive.origin=PROD
hive.schedule.interval_minutes=60
hive.schedule.enabled=true
