# =============================================================================
# Argus Insight UserSync - Variable Definitions
# =============================================================================
# These variables are referenced in config.yml using ${variable:default} syntax.
# Modify values here to customize the configuration.

# --- Logging ---
log.level=INFO
log.dir=/var/log/argus-insight-usersync
log.filename=usersync.log

# --- Sync Source ---
# Supported: unix, ldap, file
sync.source=unix
# Comma-separated list of users to sync (empty = all)
sync.user_filter=
# Comma-separated list of groups to sync (empty = all)
sync.group_filter=
# Minimum UID/GID for unix source (skip system users)
sync.min_uid=500
sync.min_gid=500

# --- LDAP Source ---
ldap.url=ldap://localhost:389
ldap.bind_dn=
ldap.bind_password=
ldap.user_search_base=ou=users,dc=example,dc=com
ldap.user_search_filter=(objectClass=person)
ldap.user_name_attribute=uid
ldap.user_group_name_attribute=memberOf
ldap.group_search_base=ou=groups,dc=example,dc=com
ldap.group_search_filter=(objectClass=groupOfNames)
ldap.group_name_attribute=cn
ldap.group_member_attribute=member
ldap.page_size=500
ldap.use_ssl=false

# --- File Source ---
file.users_path=
file.groups_path=
file.format=csv

# --- Ranger Admin ---
ranger.url=http://localhost:6080
ranger.username=admin
ranger.password=admin
ranger.timeout=30
ranger.ssl_verify=true
